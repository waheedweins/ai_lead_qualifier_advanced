services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lead_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lead_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql://postgres:password@postgres:5432/lead_engine
      APIFY_API_TOKEN: dummy_local
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
